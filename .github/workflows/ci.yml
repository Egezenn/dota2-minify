name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run Ruff Format Check
        run: uv run ruff format --check

      - name: Run Ruff Check (including Import Sorting)
        run: uv run ruff check . --select E,F,I

      - name: Run Pytest
        run: uv run pytest
