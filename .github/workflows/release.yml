name: Release

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Name the release"
        required: true
        default: "Minify-v1." # DEPRECATE: bad tag name
      prerelease:
        description: "Whether or not release candidate"
        required: true
        type: choice
        options:
          - true
          - false
        default: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set version
        shell: pwsh
        run: |
          $releaseName = "${{ github.event.inputs.release_name }}"
          $version = $releaseName.Substring(8)  # DEPRECATE: bad tag name, replace with 1
          (Get-Content Minify/core/base.py) -replace '^VERSION = .*', "VERSION = `"$version`"" | Set-Content Minify/core/base.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        if: ${{ inputs.prerelease == 'false' && matrix.os == 'ubuntu-latest' }}
        with:
          commit_message: "Version change"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Make and activate virtual environment (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m venv .venv
          .\.venv\Scripts\activate
      - name: Make and activate virtual environment (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m venv .venv
          source ./.venv/bin/activate

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          Set-Location Minify

      - name: Build executable
        shell: pwsh
        run: |
          Set-Location scripts
          pyinstaller Minify.spec

      - name: Move project dependencies
        shell: pwsh
        run: |
          Set-Location scripts
          Copy-Item -Path "..\Minify\bin" -Destination "dist\Minify\bin" -Recurse
          Copy-Item -Path "..\Minify\mods" -Destination "dist\Minify\mods" -Recurse
          Copy-Item -Path "..\README.md" -Destination "dist\Minify\README.md"
          Copy-Item -Path "..\LICENSE" -Destination "dist\Minify\LICENSE"

      # --- SIGNING STEP 1: Sign Minify.exe ---
      - name: Zip intermediate build for signing
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location scripts/dist/Minify
          7z a -tzip "../../../unsigned-minify.zip" ./*

      - name: Upload unsigned Minify binary for SignPath
        if: matrix.os == 'windows-latest'
        id: upload-unsigned-minify
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-minify
          path: unsigned-minify.zip

      - name: Sign Minify.exe via SignPath
        if: matrix.os == 'windows-latest'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ secrets.SIGNPATH_ORGANIZATION_ID }}"
          project-slug: "dota2-minify-binary"
          signing-policy-slug: "test-signing"
          github-artifact-id: "${{ steps.upload-unsigned-minify.outputs.artifact-id }}"
          wait-for-completion: true
          output-artifact-directory: "signed-minify"

      - name: Extract signed Minify binary
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Expand-Archive -Path signed-minify/*.zip -DestinationPath scripts/dist/Minify -Force

      # --- PORTABLE BUNDLES & INSTALLER COMPILE ---
      - name: Build Installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location scripts
          python version_util.py
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      # --- SIGNING STEP 2: Sign Installer ---
      - name: Zip installer for signing
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          7z a -tzip "unsigned-installer.zip" scripts/*.exe

      - name: Upload unsigned installer for SignPath
        if: matrix.os == 'windows-latest'
        id: upload-unsigned-installer
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: unsigned-installer.zip

      - name: Sign Installer via SignPath
        if: matrix.os == 'windows-latest'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ secrets.SIGNPATH_ORGANIZATION_ID }}"
          project-slug: "dota2-minify-installer"
          signing-policy-slug: "test-signing"
          github-artifact-id: "${{ steps.upload-unsigned-installer.outputs.artifact-id }}"
          wait-for-completion: true
          output-artifact-directory: "signed-installer"

      - name: Extract signed installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Remove-Item scripts/*.exe
          Expand-Archive -Path signed-installer/*.zip -DestinationPath scripts -Force

      - name: Bundle Portable Release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location scripts/dist/Minify
          7z a -tzip -mm=lzma -mx=9 "../../../${{ github.event.inputs.release_name }}-windows.zip" ./*
          Set-Location ../../..

      - name: Bundle Portable Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd scripts/dist/Minify
          7z a -tzip -mm=lzma -mx=9 "../../../${{ github.event.inputs.release_name }}-linux.zip" ./*
          cd ../../..

      - name: Create Portable Release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ inputs.prerelease }}
          tag_name: ${{ github.event.inputs.release_name }}
          files: |
            ${{ github.event.inputs.release_name }}-windows.zip
            scripts/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (Codeberg Windows)
        if: matrix.os == 'windows-latest'
        uses: akkuman/gitea-release-action@v1
        with:
          server_url: https://codeberg.org
          token: ${{ secrets.CODEBERG_TOKEN }}
          tag_name: ${{ github.event.inputs.release_name }}
          files: |
            ${{ github.event.inputs.release_name }}-windows.zip
            scripts/*.exe
          prerelease: ${{ inputs.prerelease }}
      - name: Create Portable Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ inputs.prerelease }}
          tag_name: ${{ github.event.inputs.release_name }}
          files: "${{ github.event.inputs.release_name }}-linux.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (Codeberg Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: akkuman/gitea-release-action@v1
        with:
          server_url: https://codeberg.org
          token: ${{ secrets.CODEBERG_TOKEN }}
          tag_name: ${{ github.event.inputs.release_name }}
          files: "${{ github.event.inputs.release_name }}-linux.zip"
          prerelease: ${{ inputs.prerelease }}

  update-docs:
    needs: build
    if: ${{ github.event.inputs.prerelease == 'false' }}
    uses: ./.github/workflows/docs.yml
    secrets: inherit
