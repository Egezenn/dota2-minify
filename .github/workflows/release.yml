name: Release

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Name the release"
        required: true
        default: "Minify-v1." # DEPRECATE: bad tag name
      prerelease:
        description: "Whether or not release candidate"
        required: true
        type: choice
        options:
          - true
          - false
        default: "true"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set version
        shell: pwsh
        run: |
          $releaseName = "${{ github.event.inputs.release_name }}"
          $version = $releaseName.Substring(8)  # DEPRECATE: bad tag name, replace with 1
          (Get-Content Minify/core/base.py) -replace '^VERSION = .*', "VERSION = `"$version`"" | Set-Content Minify/core/base.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        if: ${{ inputs.prerelease == 'false' && matrix.os == 'ubuntu-latest' }}
        with:
          commit_message: "Version change"

      - name: Make and activate virtual environment (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m venv .venv
          .\.venv\Scripts\activate
      - name: Make and activate virtual environment (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m venv .venv
          source ./.venv/bin/activate

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          Set-Location Minify

      - name: Build executable
        shell: pwsh
        run: |
          Set-Location scripts
          pyinstaller Minify.spec

      - name: Move project dependencies
        shell: pwsh
        run: |
          Set-Location scripts
          Copy-Item -Path "..\Minify\bin" -Destination "dist\Minify\bin" -Recurse
          Copy-Item -Path "..\Minify\mods" -Destination "dist\Minify\mods" -Recurse
          Copy-Item -Path "..\README.md" -Destination "dist\Minify\README.md"
          Copy-Item -Path "..\LICENSE" -Destination "dist\Minify\LICENSE"
          Copy-Item -Path "..\Minify\Source2Viewer-CLI.exe" -Destination "dist\Minify"

      - name: Build Installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location scripts
          python version_util.py
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Bundle Portable Release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location scripts/dist/Minify
          7z a -tzip -mm=lzma -mx=9 "../../../${{ github.event.inputs.release_name }}-windows.zip" ./*
          Set-Location ../../..

      - name: Bundle Portable Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd scripts/dist/Minify
          7z a -tzip -mm=lzma -mx=9 "../../../${{ github.event.inputs.release_name }}-linux.zip" ./*
          cd ../../..

      - name: Create Portable Release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ inputs.prerelease }}
          tag_name: ${{ github.event.inputs.release_name }}
          files: |
            ${{ github.event.inputs.release_name }}-windows.zip
            scripts/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Portable Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ inputs.prerelease }}
          tag_name: ${{ github.event.inputs.release_name }}
          files: "${{ github.event.inputs.release_name }}-linux.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
