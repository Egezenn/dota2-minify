name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Name the release candidate"
        required: true
        default: "Minify-v1.xx.xRCx"

env:
  RELEASE_NAME: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Initialize commit body
        shell: pwsh
        run: |
          $latestTagCommitSha = git rev-list --tags --max-count=1
          $gitLog = git log "${latestTagCommitSha}..HEAD" --pretty="format:- [%s](https://github.com/Egezenn/dota2-minify/commit/%H) - @%an"
          Set-Content -Path "commit_log.md" -Value $gitLog -Encoding UTF8
          $currentLog = Get-Content -Path commit_log.md -Raw
          $logWithHeader = "Built with workflows (Release candidate, might be broken)" + $currentLog
          Set-Content -Path commit_log.md -Value $logWithHeader

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable with Nuitka
        run: |
          python -m nuitka --assume-yes-for-downloads --follow-imports --standalone --include-data-files=version=version --include-data-dir=./bin=bin --include-data-dir=./mods=mods --enable-plugin=tk-inter --windows-console-mode=disable --windows-icon-from-ico=bin/images/favicon.ico --enable-plugin=tk-inter --output-filename=Minify imgui.py
          cd imgui.dist
          Compress-Archive -Path ".\*" -DestinationPath ".\..\${{ github.event.inputs.release_name }}.zip"
          cd .\..\

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          tag_name: ${{ github.event.inputs.release_name }}
          body_path: commit_log.md
          files: "${{ github.event.inputs.release_name }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print sha
        shell: pwsh
        run: (Get-FileHash -Path ${{github.event.inputs.release_name}}.zip).Hash
